docType: data-spec
format_version: "0.0.1"

metadata:
  name: forgetful-ui
  description_short: "Data model for Forgetful MCP server UI dashboard"

# =============================================================================
# ENTITIES
# =============================================================================

entities:
  memory:
    label: Memory
    description: "Atomic knowledge unit following Zettlekasten principles. ONE concept per memory - easily titled, understood at first glance"
    fields:
      id:
        type: integer
        pk: true
      title:
        type: string
        required: true
        description: "Concise, scannable title (5-50 words)"
      content:
        type: string
        required: true
        description: "ONE concept, self-contained (max ~400 words)"
      context:
        type: string
        required: true
        description: "WHY this matters, HOW it relates to other concepts"
      keywords:
        type: json
        description: "Search terms for semantic discovery (array of strings, max 10)"
      tags:
        type: json
        description: "Categories for grouping memories (array of strings, max 10)"
      importance:
        type: integer
        default: 7
        description: "1-10 scale. 9-10=foundational, 8-9=critical, 7-8=useful, <6=low priority"
      is_obsolete:
        type: boolean
        default: false
      obsolete_reason:
        type: string
      superseded_by:
        type: integer
        description: "ID of memory that supersedes this one"
      obsoleted_at:
        type: datetime
      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  project:
    label: Project
    description: "Organizational container for memories, documents, code artifacts. Enables scoped queries"
    fields:
      id:
        type: integer
        pk: true
      name:
        type: string
        required: true
        description: "Short identifier (e.g., 'forgetful', 'speech')"
      description:
        type: string
        required: true
        description: "Purpose and scope overview"
      project_type:
        type: project_type
        required: true
      status:
        type: project_status
        default: active
      repo_name:
        type: string
        description: "GitHub repository in 'owner/repo' format"
      notes:
        type: string
        description: "Workflow notes, setup instructions"
      memory_count:
        type: integer
        default: 0
        description: "Computed: number of linked memories"
      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  entity:
    label: Entity
    description: "Real-world entity: person, organization, team, device. Forms knowledge graph"
    fields:
      id:
        type: integer
        pk: true
      name:
        type: string
        required: true
        description: "Searchable identifier"
      entity_type:
        type: entity_type
        required: true
      custom_type:
        type: string
        description: "Required when entity_type is 'Other'"
      notes:
        type: string
        description: "Additional context, bio, description"
      tags:
        type: json
        description: "Tags for categorization (array of strings)"
      aka:
        type: json
        description: "Alternative names/aliases for this entity (array of strings, e.g., ['Johnny', 'J.S.'] for 'John Smith')"
      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  entity_relationship:
    label: Entity Relationship
    description: "Directed edge in knowledge graph connecting two entities"
    fields:
      id:
        type: integer
        pk: true
      source_entity_id:
        type: integer
        required: true
        description: "Source entity (from)"
      target_entity_id:
        type: integer
        required: true
        description: "Target entity (to)"
      relationship_type:
        type: string
        required: true
        description: "Type: 'works_at', 'owns', 'manages', 'part_of', 'reports_to'"
      strength:
        type: decimal
        description: "0.0-1.0 relationship significance"
      confidence:
        type: decimal
        description: "0.0-1.0 certainty about relationship"
      metadata:
        type: json
        description: "Flexible context: source, dates, roles"
      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  document:
    label: Document
    description: "Long-form content: documentation, reports, meeting notes, analysis"
    fields:
      id:
        type: integer
        pk: true
      title:
        type: string
        required: true
      description:
        type: string
        required: true
        description: "Document's purpose and summary"
      content:
        type: string
        required: true
        description: "Full text content (markdown, text)"
      document_type:
        type: string
        default: "text"
        description: "Format: 'markdown', 'text', 'report', 'notes'"
      filename:
        type: string
        description: "Original filename if imported"
      size_bytes:
        type: integer
        description: "Auto-calculated from content"
      tags:
        type: json
        description: "Tags for categorization (array of strings)"
      project_id:
        type: integer
      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  code_artifact:
    label: Code Artifact
    description: "Reusable code snippet, pattern, or implementation example"
    fields:
      id:
        type: integer
        pk: true
      title:
        type: string
        required: true
        description: "Searchable identifier"
      description:
        type: string
        required: true
        description: "Purpose and use case"
      code:
        type: string
        required: true
        description: "Complete code implementation"
      language:
        type: string
        required: true
        description: "Programming language (lowercase: 'python', 'typescript')"
      tags:
        type: json
        description: "Tags for categorization (array of strings)"
      project_id:
        type: integer
      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  plan:
    label: Plan
    description: "Implementation plan for a project goal. Contains tasks with dependencies and acceptance criteria"
    fields:
      id:
        type: integer
        pk: true
      title:
        type: string
        required: true
        description: "Plan title (max 500 chars)"
      project_id:
        type: integer
        required: true
        description: "Parent project"
      goal:
        type: string
        description: "What this plan aims to achieve (max 2000 chars)"
      context:
        type: string
        description: "Background context and constraints (max 2000 chars)"
      status:
        type: plan_status
        default: draft
      task_count:
        type: integer
        default: 0
        description: "Computed: number of tasks in this plan"
      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  task:
    label: Task
    description: "Actionable work item within a plan. Has state machine, priority, criteria, and dependencies"
    fields:
      id:
        type: integer
        pk: true
      plan_id:
        type: integer
        required: true
        description: "Parent plan"
      title:
        type: string
        required: true
        description: "Task title (max 500 chars)"
      description:
        type: string
        description: "Detailed task description (max 5000 chars)"
      state:
        type: task_state
        default: todo
      priority:
        type: task_priority
        default: P2
      assigned_agent:
        type: string
        description: "Agent/person assigned to this task (max 200 chars)"
      version:
        type: integer
        default: 1
        description: "Optimistic locking version for concurrent updates"
      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  criterion:
    label: Acceptance Criterion
    description: "Acceptance criterion for a task. All criteria must be met for task completion"
    fields:
      id:
        type: integer
        pk: true
      task_id:
        type: integer
        required: true
        description: "Parent task"
      description:
        type: string
        required: true
        description: "What needs to be true for this criterion to be met (max 1000 chars)"
      met:
        type: boolean
        default: false
      met_at:
        type: datetime
        description: "When this criterion was marked as met"
      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  task_dependency:
    label: Task Dependency
    description: "Dependency between tasks. Task cannot start until all dependencies are done"
    fields:
      id:
        type: integer
        pk: true
      task_id:
        type: integer
        required: true
        description: "The dependent task"
      depends_on_task_id:
        type: integer
        required: true
        description: "The task that must be completed first"
      created_at:
        type: datetime
        required: true

  activity_event:
    label: Activity Event
    description: "Audit log entry tracking entity lifecycle events (create, update, delete, read, query)"
    fields:
      id:
        type: integer
        pk: true
      entity_type:
        type: activity_entity_type
        required: true
        description: "Type of entity that changed"
      entity_id:
        type: integer
        required: true
        description: "ID of the entity (0 for links)"
      action:
        type: action_type
        required: true
        description: "What happened to the entity"
      changes:
        type: json
        description: "For updates: {field: {old: value, new: value}}"
      snapshot:
        type: json
        required: true
        description: "Full entity state at event time"
      actor:
        type: actor_type
        default: user
        description: "Who/what triggered this event"
      actor_id:
        type: string
        description: "Optional actor identifier (session ID, user ID)"
      metadata:
        type: json
        description: "Additional context (query params, link details)"
      created_at:
        type: datetime
        required: true

# =============================================================================
# ENUMS
# =============================================================================

enums:
  entity_type:
    description: "Categories of real-world entities"
    values:
      - Organization
      - Individual
      - Team
      - Device
      - Other

  project_type:
    description: "Project category for organization"
    values:
      - personal
      - work
      - learning
      - development
      - infrastructure
      - template
      - product
      - marketing
      - finance
      - documentation
      - development-environment
      - third-party-library
      - open-source

  project_status:
    description: "Project lifecycle status"
    values:
      - active
      - archived
      - completed

  plan_status:
    description: "Plan lifecycle states"
    values:
      - draft
      - active
      - completed
      - archived

  task_state:
    description: "Task state machine states"
    values:
      - todo
      - doing
      - waiting
      - done
      - cancelled

  task_priority:
    description: "Task priority levels"
    values:
      - P0  # Critical
      - P1  # High
      - P2  # Medium
      - P3  # Low

  activity_entity_type:
    description: "Types of entities that can generate activity events"
    values:
      - memory
      - project
      - document
      - code_artifact
      - entity
      - link
      - entity_memory_link
      - entity_relationship
      - entity_project_link
      - plan
      - task
      - criterion
      - task_dependency

  action_type:
    description: "Types of actions that generate activity events"
    values:
      - created
      - updated
      - deleted
      - read      # Single entity fetch (opt-in)
      - queried   # Search/query operation (opt-in)

  actor_type:
    description: "Types of actors that can trigger activity events"
    values:
      - user
      - system
      - llm-maintenance

# =============================================================================
# RELATIONS
# =============================================================================

relations:
  - entity_a: memory
    entity_b: project
    cardinality: many_to_many
    label: "belongs to"
    description: "Memory can belong to multiple projects, project has many memories"

  - entity_a: memory
    entity_b: memory
    cardinality: many_to_many
    label: "links to"
    description: "Memory can link to other related memories (bidirectional knowledge graph)"

  - entity_a: memory
    entity_b: document
    cardinality: many_to_many
    label: "references"
    description: "Memory can reference multiple documents for detailed context"

  - entity_a: memory
    entity_b: code_artifact
    cardinality: many_to_many
    label: "includes"
    description: "Memory can link to code examples and implementations"

  - entity_a: entity
    entity_b: project
    cardinality: many_to_many
    label: "associated with"
    description: "Entity can be associated with multiple projects"

  - entity_a: entity
    entity_b: entity_relationship
    cardinality: one_to_many
    label: "has outgoing"
    description: "Entity has outgoing relationships to other entities (via source_entity_id)"

  - entity_a: project
    entity_b: document
    cardinality: one_to_many
    label: "contains"
    description: "Project contains multiple documents (via document.project_id)"

  - entity_a: project
    entity_b: code_artifact
    cardinality: one_to_many
    label: "contains"
    description: "Project contains multiple code artifacts (via code_artifact.project_id)"

  - entity_a: project
    entity_b: plan
    cardinality: one_to_many
    label: "has plans"
    description: "Project can have multiple plans (via plan.project_id)"

  - entity_a: plan
    entity_b: task
    cardinality: one_to_many
    label: "contains"
    description: "Plan contains multiple tasks (via task.plan_id)"

  - entity_a: task
    entity_b: criterion
    cardinality: one_to_many
    label: "has criteria"
    description: "Task has acceptance criteria (via criterion.task_id)"

  - entity_a: task
    entity_b: task_dependency
    cardinality: one_to_many
    label: "has dependencies"
    description: "Task can depend on other tasks (via task_dependency.task_id)"

  - entity_a: entity
    entity_b: memory
    cardinality: many_to_many
    label: "linked to"
    description: "Entity can be linked to multiple memories (via entity_memory_links)"
